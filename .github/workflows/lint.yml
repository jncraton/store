name: Lint

on:
  push:
    branches: ['*']
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: |
          npm ci --no-audit --no-fund || true
      - name: Check formatting with Prettier
        run: npx prettier --check .
